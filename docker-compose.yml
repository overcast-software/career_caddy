---
# Unified local development environment
#
# Core stack: db + api + frontend + chat + browser-mcp
#
# Usage:
#   docker compose up                                        # full dev stack
#
# Copy .env.example to .env and fill in values before first run.

services:

  # ── Core ─────────────────────────────────────────────────────────────────

  db:
    image: postgres:18
    environment:
      POSTGRES_DB: ${DB_NAME:-job_hunting}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql   # postgres 18+: mount the parent dir, not /data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
    # Override production entrypoint to use Django dev server with hot reload
    entrypoint: ""
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./api:/app
      # Preserve the container's uv venv — the bind mount above would shadow it otherwise
      - api_venv:/app/.venv
      - screenshots:/app/screenshots
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-job_hunting}
      DEBUG: "True"
      SA_SCHEMA_ON_POST_MIGRATE: "True"
      # Fallback for local dev — always set a real value in .env
      SECRET_KEY: ${SECRET_KEY:-dev-only-insecure-do-not-use-in-production}
      ALLOWED_HOSTS: "localhost,127.0.0.1,api"
      USE_MCP_BROWSER_AGENT: "${USE_MCP_BROWSER_AGENT:-False}"
      BROWSER_MCP_SSE_URL: "http://browser-mcp:3004/sse"
      CHAT_SERVICE_URL: "http://chat:8000"
      SCREENSHOT_DIR: /app/screenshots
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@localhost}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4200}
      INSTANCE_ORIGIN: ${INSTANCE_ORIGIN:-http://localhost:8000}
    depends_on:
      db:
        condition: service_healthy

  # ── Events (SSE) ──────────────────────────────────────────────────────────
  # ASGI SSE process (uvicorn) serving GET /api/v1/events/. Shares the api
  # image/venv but runs off the sync gunicorn pool — see api notes
  # Plans/SSE off sync gunicorn (Option B). Locally there is no caddy, so the
  # Ember frontend still hits the sync events.py path on :8000; this service
  # is exposed on :8001 to exercise the ASGI app directly
  # (curl 'http://localhost:8001/api/v1/events/?token=...'). Needs `make build`
  # after the pyproject adds uvicorn/starlette so they land in the api_venv.
  events:
    build:
      context: ./api
    entrypoint: ""
    command: ["uvicorn", "job_hunting.sse_asgi:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]
    volumes:
      - ./api:/app
      - api_venv:/app/.venv
      - screenshots:/app/screenshots
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-job_hunting}
      DEBUG: "True"
      SECRET_KEY: ${SECRET_KEY:-dev-only-insecure-do-not-use-in-production}
      ALLOWED_HOSTS: "localhost,127.0.0.1,events"
      SA_SCHEMA_ON_POST_MIGRATE: "False"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8001/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    depends_on:
      db:
        condition: service_healthy

  # ── Worker ──────────────────────────────────────────────────────────────
  # django-q2 task worker — Phase 1 of Plans/Job-queue integration. Shares
  # the api image (same code, same venv, same env). Runs `manage.py qcluster`
  # to consume the django_q_ormq queue table off the same Postgres DB. No
  # behavior change in Phase 1 — only the `health_check` task is wired in.
  # Subsequent phases migrate the 9 daemon-thread spawn points + 2 polling
  # daemons (hold-poller atomic-deleted in Phase 4).
  worker:
    build:
      context: ./api
    entrypoint: ""
    command: python manage.py qcluster
    # Same image as api, which ships a HEALTHCHECK curling :8000. The worker has
    # no HTTP surface, so the inherited probe always fails and the container
    # shows "unhealthy". Disable it here too (parity with docker-compose.prod.yml).
    healthcheck:
      disable: true
    volumes:
      - ./api:/app
      - api_venv:/app/.venv
      - screenshots:/app/screenshots
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-job_hunting}
      DEBUG: "True"
      SECRET_KEY: ${SECRET_KEY:-dev-only-insecure-do-not-use-in-production}
      # Worker doesn't serve HTTP, but Django still wants ALLOWED_HOSTS
      # set when running management commands in some configurations.
      ALLOWED_HOSTS: "localhost,127.0.0.1,worker"
      USE_MCP_BROWSER_AGENT: "${USE_MCP_BROWSER_AGENT:-False}"
      BROWSER_MCP_SSE_URL: "http://browser-mcp:3004/sse"
      CHAT_SERVICE_URL: "http://chat:8000"
      SCREENSHOT_DIR: /app/screenshots
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@localhost}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4200}
    depends_on:
      db:
        condition: service_healthy
      api:
        # Wait for api to come up so it can run migrations first; the
        # worker can't qcluster a database whose django_q_* tables
        # don't exist yet.
        condition: service_started

  frontend:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    # Only reinstall deps when the lockfile changed (else go straight to
    # ember serve). npm ci deletes and re-fetches node_modules on every run,
    # so an unconditional `npm ci` wipes the frontend_node_modules volume and
    # depends on a flawless burst of registry fetches at every boot — a single
    # transient DNS blip (EAI_AGAIN) aborts the chain and crash-loops the
    # container. The guard makes the persisted volume actually load-bearing;
    # npm ci is retried once and NPM_CONFIG_FETCH_* hardens the install burst.
    command: >
      sh -c '
      if [ ! -f node_modules/.package-lock.json ] || [ package-lock.json -nt node_modules/.package-lock.json ]; then
      echo "[frontend] installing deps (lockfile changed or node_modules incomplete)...";
      npm ci || npm ci;
      else
      echo "[frontend] deps present and lockfile unchanged - skipping npm ci";
      fi;
      npm run tailwind:build &&
      npx ember serve --proxy http://api:8000
      '
    ports:
      - "4200:4200"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      # Harden the install burst against marginal container DNS (EAI_AGAIN).
      NPM_CONFIG_FETCH_RETRIES: "5"
      NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: "20000"
      NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: "120000"
      NPM_CONFIG_FETCH_TIMEOUT: "300000"
    # A hard exit (e.g. an Ember crash) should self-recover.
    restart: unless-stopped
    depends_on:
      - api

  # ── Chat Service ─────────────────────────────────────────────────────────
  # SSE streaming chat — API proxies to this service after JWT auth.

  chat:
    build:
      context: ./agents
      args:
        INSTALL_CAMOUFOX: "false"
    working_dir: /app
    command: sh -c "uv sync && uv run caddy-chat"
    volumes:
      - ./agents:/app
      - chat_venv:/app/.venv
    environment:
      CC_API_BASE_URL: "http://api:8000"
      CHAT_HOST: "0.0.0.0"
      CHAT_PORT: "8000"
      CHAT_MODEL: ${CHAT_MODEL:-openai:gpt-4o-mini}
      CHAT_SMART_MODEL: ${CHAT_SMART_MODEL:-anthropic:claude-sonnet-4-6}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LOGFIRE_TOKEN: ${LOGFIRE_TOKEN:-}
    depends_on:
      - api

  # ── Browser MCP Server ───────────────────────────────────────────────────
  # Exposes browser automation via SSE for scraping and Claude Desktop.
  # Requires INSTALL_CAMOUFOX=true (default) to include the Firefox binary in the image.

  browser-mcp:
    build:
      context: ./agents
      args:
        INSTALL_CAMOUFOX: "${INSTALL_CAMOUFOX:-true}"
    working_dir: /app
    command: uv run python mcp_servers/browser_server.py
    ports:
      - "3004:3004"
    env_file: .env
    environment:
      FASTMCP_HOST: "0.0.0.0"
      FASTMCP_PORT: "3004"
      CAMOUFOX_DATA_DIR: /opt/camoufox
      SCREENSHOT_DIR: /app/screenshots
    volumes:
      - ./agents/secrets.yml:/app/secrets.yml:ro


volumes:
  postgres_data:
  frontend_node_modules:
  api_venv:
  chat_venv:
  screenshots:
