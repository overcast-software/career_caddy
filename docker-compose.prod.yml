---
# Production deployment — VPS via docker compose.
#
# This file is cc-owned and lives at /opt/stacks/careercaddy.online/
# on racknerd after dagger deploy scp's it. Previously ansible
# (dc/playbooks/racknerd/careercaddy.online.yml) was also writing
# to that path — dc unwound and archived the playbook 2026-05-31
# so this file is the single source of truth. See cc/notes.org
# Operations/Deploy debugging 2026-05-30 for the full story.
#
# Required env vars (set in .env on the server):
#   SECRET_KEY, DB_PASSWORD, IMAGE_TAG, EMAIL_HOST, EMAIL_HOST_USER,
#   EMAIL_HOST_PASSWORD. Optional: ALLOWED_HOSTS, CORS_ALLOWED_ORIGINS,
#   CSRF_TRUSTED_ORIGINS, TAILSCALE_IP, FRONTEND_URL, LOGFIRE_TOKEN.
#
# Deploy:
#   docker compose pull
#   docker compose down --remove-orphans
#   docker compose up -d --remove-orphans

# Pin the compose project name so it doesn't shift if the dir is
# renamed. Container names are also explicit per-service so `down`
# always finds the correct rows even if the project label drifts.
name: careercaddyonline

services:

  db:
    image: postgres:18
    container_name: careercaddy-db
    restart: unless-stopped
    networks:
      - default
    environment:
      POSTGRES_DB: ${DB_NAME:-job_hunting}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      # postgres 18+: mount the parent dir, not /data
      - postgres_data:/var/lib/postgresql
    ports:
      - "127.0.0.1:5432:5432"
      - "${TAILSCALE_IP:-127.0.0.1}:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m

  api:
    image: ghcr.io/overcast-software/career_caddy_api:${IMAGE_TAG:-latest}
    container_name: careercaddy-api
    restart: unless-stopped
    networks:
      - default
      - proxy
    ports:
      - "127.0.0.1:8025:8000"
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-job_hunting}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-careercaddy.online,api.careercaddy.online,localhost,127.0.0.1,api}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://careercaddy.online}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://careercaddy.online}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SCRAPING_ENABLED: ${SCRAPING_ENABLED:-False}
      ALLOW_BOOTSTRAP_SUPERUSER: ${ALLOW_BOOTSTRAP_SUPERUSER:-False}
      BOOTSTRAP_TOKEN: ${BOOTSTRAP_TOKEN:-}
      GUNICORN_HOST: "0.0.0.0"
      GUNICORN_PORT: "8000"
      GUNICORN_WORKERS: "6"
      GUNICORN_THREADS: "2"
      SA_SCHEMA_ON_POST_MIGRATE: "True"
      USE_MCP_BROWSER_AGENT: "False"
      CHAT_SERVICE_URL: "http://chat:8000"
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:?EMAIL_HOST is required}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:?EMAIL_HOST_USER is required}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:?EMAIL_HOST_PASSWORD is required}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@careercaddy.online}
      FRONTEND_URL: ${FRONTEND_URL:-https://careercaddy.online}
      SCREENSHOT_DIR: /app/screenshots
      LOGFIRE_TOKEN: ${LOGFIRE_TOKEN:-}
      INSTANCE_ORIGIN: ${INSTANCE_ORIGIN:-http://localhost:8000}
    volumes:
      - screenshots:/app/screenshots
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/v1/healthcheck || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    mem_limit: 768m
    labels:
      caddy: api.careercaddy.online
      caddy.import: cc_log
      # The SSE stream runs on the separate ASGI `events` service (uvicorn,
      # off the sync gunicorn pool) so a long-lived stream can't peg/SIGKILL
      # an api worker — see api notes Plans/SSE off sync gunicorn (Option B).
      # EXACT-path match (no trailing *) so POST /api/v1/events/token/ stays
      # on the gunicorn api; only GET /api/v1/events/ (the stream) is split
      # off. flush_interval -1 disables proxy buffering for text/event-stream.
      # Mirrors the proven handle_N pattern on the frontend service below.
      caddy.handle_0: /api/v1/events/
      caddy.handle_0.reverse_proxy: events:8001
      caddy.handle_0.reverse_proxy.flush_interval: "-1"
      caddy.reverse_proxy: "{{upstreams 8000}}"
      caddy.reverse_proxy.transport: http
      caddy.reverse_proxy.transport.read_timeout: 2m
      caddy.reverse_proxy.transport.write_timeout: 2m

  # ── Events (SSE) ──────────────────────────────────────────────────────────
  # Separate ASGI process serving ONLY the long-lived SSE stream
  # (GET /api/v1/events/). Shares the api image (same SHA/code/env) but runs
  # uvicorn instead of gunicorn, so the stream lives off the sync gunicorn
  # pool: uvicorn has no arbiter SIGKILL, so a >120s stream survives and one
  # stuck stream can't halve api request capacity. caddy routes the exact
  # path /api/v1/events/ here (see the api service labels); the token POST
  # and everything else stay on the gunicorn api. Option B of the api notes
  # Plans/SSE off sync gunicorn — A-B-C tradeoff.
  events:
    image: ghcr.io/overcast-software/career_caddy_api:${IMAGE_TAG:-latest}
    container_name: careercaddy-events
    restart: unless-stopped
    networks:
      - default   # reach db for the LISTEN connection
      - proxy     # so caddy resolves `events` as the SSE upstream
    entrypoint: ""
    command: ["uvicorn", "job_hunting.sse_asgi:app", "--host", "0.0.0.0", "--port", "8001"]
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-job_hunting}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-careercaddy.online,api.careercaddy.online,localhost,127.0.0.1,events}
      SA_SCHEMA_ON_POST_MIGRATE: "False"  # api runs migrations; events just LISTENs
      LOGFIRE_TOKEN: ${LOGFIRE_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8001/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    mem_limit: 256m

  # ── Worker ──────────────────────────────────────────────────────────────
  # django-q2 task worker — Phase 1 of Plans/Job-queue integration. Shares
  # the api image (same SHA, same code, same env) so a tagged deploy moves
  # api + worker together. No HTTP surface; consumes django_q_ormq off the
  # same Postgres DB. No behavior change in Phase 1 — only the
  # `health_check` task is wired in. Subsequent phases migrate the 9
  # daemon-thread spawn points + 2 polling daemons (hold-poller
  # atomic-deleted in Phase 4).
  worker:
    image: ghcr.io/overcast-software/career_caddy_api:${IMAGE_TAG:-latest}
    container_name: careercaddy-worker
    restart: unless-stopped
    networks:
      - default
    entrypoint: ""
    command: python manage.py qcluster
    # The shared api image ships a HEALTHCHECK (api/Dockerfile) that curls
    # http://127.0.0.1:8000/api/v1/healthcheck — correct for the gunicorn api,
    # but the worker runs qcluster with no HTTP surface, so the probe can never
    # connect and the container reports "unhealthy" forever despite processing
    # tasks fine. No cheap worker-side probe catches the real failure mode (DB
    # unreachable / cluster wedged), so disable the inherited check rather than
    # ship a green-theater one. Liveness is covered by restart:unless-stopped +
    # qcluster reincarnation; processing is observable via django_q_task.
    healthcheck:
      disable: true
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-job_hunting}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-careercaddy.online,api.careercaddy.online,localhost,127.0.0.1,worker}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SCRAPING_ENABLED: ${SCRAPING_ENABLED:-False}
      SA_SCHEMA_ON_POST_MIGRATE: "False"  # api runs migrations; worker just consumes
      Q_WORKERS: "1"  # rn drops to 1; off-rn worker stacks set their own
      USE_MCP_BROWSER_AGENT: "False"
      CHAT_SERVICE_URL: "http://chat:8000"
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:?EMAIL_HOST is required}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:?EMAIL_HOST_USER is required}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:?EMAIL_HOST_PASSWORD is required}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@careercaddy.online}
      FRONTEND_URL: ${FRONTEND_URL:-https://careercaddy.online}
      SCREENSHOT_DIR: /app/screenshots
      LOGFIRE_TOKEN: ${LOGFIRE_TOKEN:-}
      CAREER_CADDY_INSTANCE: ${CAREER_CADDY_INSTANCE:-careercaddy.online}
      # Full origin used to mint ActivityPub keyId / actor / object URIs. MUST
      # be set on the worker too: it runs the async federation dispatch
      # (dispatch_one), and an unset value falls back to settings' localhost
      # default, signing Create(Note) with a keyId remote instances can't
      # dereference → HTTP-signature 401 → posts never federate. The api
      # service sets this; the worker omitting it is why sync Accept(Follow)
      # worked but async post fan-out silently failed. Mirror of the api line.
      INSTANCE_ORIGIN: ${INSTANCE_ORIGIN:-http://localhost:8000}
    volumes:
      - screenshots:/app/screenshots
    depends_on:
      db:
        condition: service_healthy
      api:
        # api owns the migration run on boot; worker waits for it to be
        # at least started before trying to qcluster against the queue
        # tables.
        condition: service_started
    mem_limit: 384m

  frontend:
    image: ghcr.io/overcast-software/career-caddy-frontend:${IMAGE_TAG:-latest}
    container_name: careercaddy-frontend
    restart: unless-stopped
    networks:
      - default
      - proxy
    ports:
      - "127.0.0.1:8087:80"
    depends_on:
      - api
    mem_limit: 64m
    labels:
      caddy: careercaddy.online
      caddy.import: cc_log
      caddy.encode: zstd gzip
      # Same-origin: SPA emits /api/v1/... to its own host; we route
      # those to the api container, preserving the /api prefix (handle,
      # not handle_path) so Django routes them correctly.
      caddy.handle_0: /api/*
      caddy.handle_0.reverse_proxy: api:8000
      # ActivityPub federation: WebFinger + Actor URIs MUST live on the
      # apex host because federation peers resolve via the host in the
      # acct: URI. The api routes these at root paths — not /api/* —
      # per RFC 7033 and ActivityPub conventions; see
      # api/job_hunting/urls.py lines 135-152.
      caddy.@federation.path_0: /.well-known/webfinger
      caddy.@federation.path_1: /actors/*
      # BACK-93: activity object ids have no human/SPA sibling — route all
      # /activities/* to the api (same treatment as /actors/*), no Accept gate.
      caddy.@federation.path_2: /activities/*
      caddy.handle_1: "@federation"
      caddy.handle_1.reverse_proxy: api:8000
      # BACK-93: job-post object ids are DUAL-PURPOSE — the SPA serves the
      # human /job-posts/<id> page; the api serves the AS2 Note at the same
      # URI. Gate on an ActivityPub Accept header so only federation peers
      # reach the api; browsers fall through to the SPA catch-all below.
      caddy.@ap_objects.path: /job-posts/*
      caddy.@ap_objects.header_regexp: Accept application/(activity|ld)\+json
      caddy.handle_2: "@ap_objects"
      caddy.handle_2.reverse_proxy: api:8000
      # Catch-all: SPA fallback for everything else.
      caddy.reverse_proxy: "{{upstreams 80}}"

  # ── Public MCP Server ────────────────────────────────────────────────────
  # Exposes career-data tools via MCP protocol at mcp.careercaddy.online.
  # Auth: clients supply their own jh_* API key — no CC_API_TOKEN needed.
  # Security: no secrets.yml, no mail volumes, no browser automation.

  mcp:
    image: ghcr.io/overcast-software/career_caddy_ai:${IMAGE_TAG:-latest}
    container_name: careercaddy-mcp
    restart: unless-stopped
    networks:
      - default
      - proxy
    ports:
      - "127.0.0.1:8030:8000"
    environment:
      CC_API_BASE_URL: "http://api:8000"
      FASTMCP_HOST: "0.0.0.0"
      FASTMCP_PORT: "8000"
      LOGFIRE_TOKEN: ${LOGFIRE_TOKEN:-}
    command: ["uv", "run", "caddy-public"]
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      # /mcp requires auth (jh_* API key), so a bare GET returns 401 —
      # which IS the server-is-up signal. Accept any 2xx or 4xx as
      # healthy; 5xx or connection failure marks unhealthy. Without
      # this, caddy-docker-proxy filters the container out of routing
      # and external clients see 502 instead of the proper 401.
      test: ["CMD-SHELL", "curl -sS -o /dev/null -w '%{http_code}' http://127.0.0.1:8000/mcp | grep -qE '^[24]'"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    mem_limit: 256m
    labels:
      caddy: mcp.careercaddy.online
      caddy.import: cc_log
      caddy.reverse_proxy: "{{upstreams 8000}}"

  # ── Chat Server (internal) ─────────────────────────────────────────────
  # SSE streaming chat endpoint — api proxies to this service.
  # Not exposed to the internet; only reachable via the Docker network.
  # No caddy label — internal-only.

  chat:
    image: ghcr.io/overcast-software/career_caddy_ai:${IMAGE_TAG:-latest}
    container_name: careercaddy-chat
    restart: unless-stopped
    networks:
      - default
    ports:
      # Kept for local debug only. Could be dropped post-migration.
      - "127.0.0.1:8031:8000"
    environment:
      CC_API_BASE_URL: "http://api:8000"
      CHAT_HOST: "0.0.0.0"
      CHAT_PORT: "8000"
      CHAT_MODEL: ${CHAT_MODEL:-openai:gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LOGFIRE_TOKEN: ${LOGFIRE_TOKEN:-}
    command: ["uv", "run", "caddy-chat"]
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    mem_limit: 768m

networks:
  default:
  proxy:
    # Created and managed by dc's tasks/debian/caddy.yml on racknerd.
    # caddy-docker-proxy watches containers on this network for `caddy:`
    # labels and synthesizes site blocks on the fly. Marking it
    # `external: true` here means compose does NOT create/destroy it.
    external: true

# External volumes — created under the legacy `career_caddy_` project
# prefix when this stack first ran from ~/Projects/career_caddy. Kept
# the names so the migration to /opt/stacks/careercaddy.online +
# project=careercaddyonline does not orphan the postgres data or
# screenshots volume. Compose will NOT create/destroy these here.
volumes:
  postgres_data:
    external: true
    name: career_caddy_postgres_data
  screenshots:
    external: true
    name: career_caddy_screenshots
