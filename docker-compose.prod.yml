---
# Production deployment — VPS via docker compose
#
# Uses pre-built images from GHCR. Core stack only (db + api + frontend).
#
# Deploy:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d --remove-orphans
#
# Required env vars (set in .env on the server):
#   SECRET_KEY, DB_PASSWORD, ALLOWED_HOSTS, CORS_ALLOWED_ORIGINS,
#   CSRF_TRUSTED_ORIGINS, IMAGE_TAG, TAILSCALE_IP (optional)

services:

  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-job_hunting}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql   # postgres 18+: mount the parent dir, not /data
    ports:
      - "127.0.0.1:5432:5432"
      - "${TAILSCALE_IP:-127.0.0.1}:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m

  api:
    image: ghcr.io/overcast-software/career_caddy_api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8025:8000"
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-job_hunting}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-api.careercaddy.online,localhost,127.0.0.1,api}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://careercaddy.online}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://careercaddy.online}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SCRAPING_ENABLED: ${SCRAPING_ENABLED:-False}
      ALLOW_BOOTSTRAP_SUPERUSER: ${ALLOW_BOOTSTRAP_SUPERUSER:-False}
      BOOTSTRAP_TOKEN: ${BOOTSTRAP_TOKEN:-}
      GUNICORN_HOST: "0.0.0.0"
      GUNICORN_PORT: "8000"
      GUNICORN_WORKERS: "2"
      SA_SCHEMA_ON_POST_MIGRATE: "True"
      USE_MCP_BROWSER_AGENT: "True"
      BROWSER_MCP_SSE_URL: "http://browser-mcp:3004/sse"
      CHAT_SERVICE_URL: "http://chat:8000"
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:?EMAIL_HOST is required}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:?EMAIL_HOST_USER is required}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:?EMAIL_HOST_PASSWORD is required}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@careercaddy.online}
      FRONTEND_URL: ${FRONTEND_URL:-https://careercaddy.online}
      SCREENSHOT_DIR: /app/screenshots
    volumes:
      - screenshots:/app/screenshots
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/v1/healthcheck || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    mem_limit: 512m

  frontend:
    image: ghcr.io/overcast-software/career-caddy-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8087:80"
    depends_on:
      - api
    mem_limit: 64m

  # ── Public MCP Server ────────────────────────────────────────────────────
  # Exposes career-data tools via MCP protocol at mcp.careercaddy.online.
  # Auth: clients supply their own jh_* API key — no CC_API_TOKEN needed.
  # Security: no secrets.yml, no mail volumes, no browser automation.

  mcp:
    image: ghcr.io/overcast-software/career_caddy_ai:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8030:8000"
    environment:
      CC_API_BASE_URL: "http://api:8000"
      FASTMCP_HOST: "0.0.0.0"
      FASTMCP_PORT: "8000"
    command: ["uv", "run", "caddy-public"]
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/mcp || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    mem_limit: 256m

  # ── Browser MCP Server (internal) ──────────────────────────────────────
  # Browser automation via Camoufox. Used by the API to scrape job URLs.
  # Not exposed to the internet; only reachable via the Docker network.

  browser-mcp:
    image: ghcr.io/overcast-software/career_caddy_ai:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      FASTMCP_HOST: "0.0.0.0"
      FASTMCP_PORT: "3004"
      CAMOUFOX_DATA_DIR: /opt/camoufox
      SCREENSHOT_DIR: /app/screenshots
      BROWSER_HEADLESS: "true"
    command: ["uv", "run", "python", "mcp_servers/browser_server.py"]
    volumes:
      - screenshots:/app/screenshots
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3004/sse || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    mem_limit: 1g

  # ── Chat Server (internal) ─────────────────────────────────────────────
  # SSE streaming chat endpoint — API proxies to this service.
  # Not exposed to the internet; only reachable via the Docker network.

  chat:
    image: ghcr.io/overcast-software/career_caddy_ai:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8031:8000"
    environment:
      CC_API_BASE_URL: "http://api:8000"
      CHAT_HOST: "0.0.0.0"
      CHAT_PORT: "8000"
      CHAT_MODEL: ${CHAT_MODEL:-openai:gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    command: ["uv", "run", "caddy-chat"]
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    mem_limit: 512m

volumes:
  postgres_data:
  screenshots:
