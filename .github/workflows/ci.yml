name: CI

on:
  push:
    branches: ['feature/**', 'develop']
  pull_request:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build and test (API + Frontend)
    runs-on: ubuntu-latest
    # 40, not 20: the SSE split added uvicorn[standard] (native uvloop/httptools
    # compiles) + django-q2 to the api image, pushing the cold `build-api` step
    # (uv sync + full Django suite) past the old 20m cap on its own — frontend +
    # AI steps never got to run. Real fix is Dagger uv-dep caching; this unblocks.
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Dagger CLI
        run: curl -fsSL https://dl.dagger.io/dagger/install.sh | DAGGER_VERSION=v0.20.8 BIN_DIR=/usr/local/bin sh

      - name: Build and test API
        run: dagger -m ./dagger call build-api

      - name: Build and test Frontend
        run: dagger -m ./dagger call build-frontend

      - name: Test AI (toolsets + security)
        run: dagger -m ./dagger call test-ai
