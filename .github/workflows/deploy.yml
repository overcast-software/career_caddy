name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  ci:
    name: Build and test (API + Frontend)
    runs-on: ubuntu-latest
    # 40, not 20: matches ci.yml — the SSE-weight api image (uvicorn[standard] +
    # django-q2) makes the cold build-api step exceed 20m on its own. Without
    # this bump the post-merge Deploy gate would time out and never deploy.
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Dagger CLI
        run: curl -fsSL https://dl.dagger.io/dagger/install.sh | DAGGER_VERSION=v0.20.8 BIN_DIR=/usr/local/bin sh

      - name: Build and test API
        run: dagger -m ./dagger call build-api

      - name: Build and test Frontend
        run: dagger -m ./dagger call build-frontend

      - name: Test AI (toolsets + security)
        run: dagger -m ./dagger call test-ai

  publish-and-deploy:
    name: Publish images and deploy to VPS
    runs-on: ubuntu-latest
    environment: production
    # 40, not 30: the cold api image build for GHCR publish carries the same
    # heavier SSE deps; give the build+publish+deploy chain headroom.
    timeout-minutes: 40
    needs: ci
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Dagger CLI
        run: curl -fsSL https://dl.dagger.io/dagger/install.sh | DAGGER_VERSION=v0.20.8 BIN_DIR=/usr/local/bin sh

      - name: Publish images to GHCR
        # Frontend builds with API_HOST="" (same-origin default). The SPA
        # emits /api/v1/... to its own host; racknerd's outer Caddy routes
        # /api/* on careercaddy.online to the api container via the
        # handle /api/* label on the frontend service.
        run: |
          dagger -m ./dagger call publish \
            --registry-token=env:GHCR_TOKEN \
            --org=overcast-software \
            --tag=${{ github.sha }} \
            --registry-username=${{ github.actor }}
        env:
          GHCR_TOKEN: ${{ github.token }}

      - name: Deploy to VPS
        # app_dir is intentionally NOT passed here. The deploy target lives in
        # the dagger default (career_caddy_pipeline.py:498 ->
        # /opt/stacks/careercaddy.online) so it is version-controlled and
        # auditable. Threading it via a DEPLOY_APP_DIR secret previously drifted
        # to a stale legacy path and broke every Deploy (5432 collision); the
        # single source of truth removes that footgun.
        run: |
          dagger -m ./dagger call deploy \
            --ssh-key=env:DEPLOY_SSH_KEY \
            --host=${{ secrets.DEPLOY_SSH_HOST }} \
            --tag=${{ github.sha }} \
            --ssh-user=${{ secrets.DEPLOY_SSH_USER }}
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
