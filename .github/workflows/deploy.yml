name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  ci:
    name: Build and test (API + Frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Dagger CLI
        run: curl -fsSL https://dl.dagger.io/dagger/install.sh | DAGGER_VERSION=v0.20.8 BIN_DIR=/usr/local/bin sh

      - name: Build and test API
        run: dagger -m ./dagger call build-api

      - name: Build and test Frontend
        run: dagger -m ./dagger call build-frontend

      - name: Test AI (toolsets + security)
        run: dagger -m ./dagger call test-ai

  publish-and-deploy:
    name: Publish images (GHCR) + smoke prod
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30
    needs: ci
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          # Full history so we can diff the previous main tip against this
          # push to see which submodule pins actually moved.
          fetch-depth: 0

      - name: Install Dagger CLI
        run: curl -fsSL https://dl.dagger.io/dagger/install.sh | DAGGER_VERSION=v0.20.8 BIN_DIR=/usr/local/bin sh

      - name: Detect changed submodule pins
        id: changed
        # Compute which submodule gitlinks moved between the previous main tip
        # (github.event.before) and this push (github.sha), mapping
        # api->api, frontend->frontend, agents->ai. publish() then cold-builds
        # only the changed images and retags the rest from prev_tag.
        #
        # FAIL SAFE: if `before` is all-zeros (first push), empty, or not a
        # reachable ancestor (force-push / shallow / rewritten history) we
        # cannot trust the diff, so we emit prev="" and changed=all three —
        # forcing publish() to build every image (today's behavior).
        run: |
          BEFORE='${{ github.event.before }}'
          SHA='${{ github.sha }}'
          ZERO='0000000000000000000000000000000000000000'
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "$ZERO" ] || ! git merge-base --is-ancestor "$BEFORE" "$SHA" 2>/dev/null; then
            echo "Previous sha unusable ($BEFORE) — fail-safe: building all images."
            echo "prev=" >> "$GITHUB_OUTPUT"
            echo "changed=api,frontend,ai" >> "$GITHUB_OUTPUT"
          else
            PATHS="$(git diff --name-only "$BEFORE" "$SHA" -- api frontend agents)"
            echo "Changed gitlinks between $BEFORE and $SHA:"
            echo "$PATHS"
            CHANGED=""
            echo "$PATHS" | grep -qx api && CHANGED="$CHANGED,api"
            echo "$PATHS" | grep -qx frontend && CHANGED="$CHANGED,frontend"
            echo "$PATHS" | grep -qx agents && CHANGED="$CHANGED,ai"
            CHANGED="${CHANGED#,}"
            echo "prev=$BEFORE" >> "$GITHUB_OUTPUT"
            echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
            echo "Resolved changed images: '$CHANGED'"
          fi

      - name: Publish images to GHCR
        # Frontend builds with API_HOST="" (same-origin default). The SPA
        # emits /api/v1/... to its own host; on GCP the frontend nginx
        # path-routes /api and /mcp same-origin to the sibling Cloud Run
        # services. GHCR images feed the public self-host bundle (and, in
        # CC-178 Step B, get mirrored into us-west1 AR for Cloud Run).
        #
        # --changed / --prev-tag drive the build-changed / retag-unchanged
        # split. Empty --changed with a real --prev-tag retags all three
        # (parent-only push, no pin moved); empty --prev-tag builds all.
        run: |
          dagger -m ./dagger call publish \
            --registry-token=env:GHCR_TOKEN \
            --org=overcast-software \
            --tag=${{ github.sha }} \
            --registry-username=${{ github.actor }} \
            --prev-tag="${{ steps.changed.outputs.prev }}" \
            --changed="${{ steps.changed.outputs.changed }}"
        env:
          GHCR_TOKEN: ${{ github.token }}

      # Prod runs on GCP Cloud Run (us-west1) and is rolled via `tofu apply`
      # (manual today; the merge->GCP CI inversion is CC-178 Step B). The
      # racknerd SSH "Deploy to VPS" step was removed at the GCP cutover — it
      # targeted a now-dev box and smoked retired api./mcp. subdomains. This
      # job publishes the GHCR images for the public self-host bundle, then
      # smokes LIVE prod on the apex (detection, not a deploy). Tier 2
      # self-skips if CC_SMOKE_API_TOKEN is unset (Tier 1 still gates).
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Wait for prod to settle
        run: |
          for i in $(seq 1 30); do
            code=$(curl -sS -o /dev/null -w '%{http_code}' https://careercaddy.online/api/v1/healthcheck/ || true)
            if [ "$code" = "200" ]; then echo "api healthy"; exit 0; fi
            echo "waiting for api ($code)…"; sleep 5
          done
          echo "api healthcheck never reached 200"; exit 1

      - name: Smoke prod (Tier 1 + Tier 2) against the apex
        working-directory: e2e
        env:
          CYPRESS_BASE_URL: https://careercaddy.online
          CYPRESS_API_URL: https://careercaddy.online
          CYPRESS_MCP_URL: https://careercaddy.online/mcp
          CYPRESS_CC_API_TOKEN: ${{ secrets.CC_SMOKE_API_TOKEN }}
          CC_API_TOKEN: ${{ secrets.CC_SMOKE_API_TOKEN }}
          MCP_URL: https://careercaddy.online/mcp
        run: |
          npm ci
          npm run smoke:tier1
          npm run smoke:mcp
          npm run smoke:tier2:api
