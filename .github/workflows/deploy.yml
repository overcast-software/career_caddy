name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  publish-and-deploy:
    name: Publish images and deploy to VPS
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Dagger CLI
        run: curl -fsSL https://dl.dagger.io/dagger/install.sh | DAGGER_VERSION=v0.20.3 BIN_DIR=/usr/local/bin sh

      - name: Publish images to GHCR
        run: |
          dagger -m ./dagger call publish \
            --registry-token=env:GHCR_TOKEN \
            --org=overcast-software \
            --tag=${{ github.sha }} \
            --registry-username=${{ github.actor }}
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

      - name: Deploy to VPS
        run: |
          dagger -m ./dagger call deploy \
            --ssh-key=env:DEPLOY_SSH_KEY \
            --host=${{ secrets.DEPLOY_SSH_HOST }} \
            --app-dir=${{ secrets.DEPLOY_APP_DIR }} \
            --tag=${{ github.sha }} \
            --ssh-user=${{ secrets.DEPLOY_SSH_USER }}
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
