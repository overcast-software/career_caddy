name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  ci:
    name: Build and test (API + Frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Dagger CLI
        run: curl -fsSL https://dl.dagger.io/dagger/install.sh | DAGGER_VERSION=v0.20.8 BIN_DIR=/usr/local/bin sh

      - name: Build and test API
        run: dagger -m ./dagger call build-api

      - name: Build and test Frontend
        run: dagger -m ./dagger call build-frontend

      - name: Test AI (toolsets + security)
        run: dagger -m ./dagger call test-ai

  publish-and-deploy:
    name: Publish images and deploy to VPS
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30
    needs: ci
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Dagger CLI
        run: curl -fsSL https://dl.dagger.io/dagger/install.sh | DAGGER_VERSION=v0.20.8 BIN_DIR=/usr/local/bin sh

      - name: Publish images to GHCR
        # --frontend-api-host pins prod to cross-origin (api.careercaddy.online).
        # When prod's outer Caddy gains a /api/* path rule, drop this flag and
        # the same-origin default takes over.
        run: |
          dagger -m ./dagger call publish \
            --registry-token=env:GHCR_TOKEN \
            --org=overcast-software \
            --tag=${{ github.sha }} \
            --registry-username=${{ github.actor }} \
            --frontend-api-host=https://api.careercaddy.online
        env:
          GHCR_TOKEN: ${{ github.token }}

      - name: Deploy to VPS
        run: |
          dagger -m ./dagger call deploy \
            --ssh-key=env:DEPLOY_SSH_KEY \
            --host=${{ secrets.DEPLOY_SSH_HOST }} \
            --app-dir=${{ secrets.DEPLOY_APP_DIR }} \
            --tag=${{ github.sha }} \
            --ssh-user=${{ secrets.DEPLOY_SSH_USER }}
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
