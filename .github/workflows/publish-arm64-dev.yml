name: Publish arm64 dev images

# Cross-builds arm64 images and publishes to GHCR as `:dev-<sha>` (immutable)
# and `:dev` (moving). No SSH deploy step — fetch is operator-driven (run
# `docker compose pull` wherever you want the arm64 images, e.g. a Raspberry Pi).
#
# MANUAL trigger only (workflow_dispatch). This is a Pi / arm64 operator-pull
# concern and is DELIBERATELY NOT the develop-tier mechanism: the develop /
# careercaddy.dev staging tier (PACA CC-126) is the LOCAL build-from-source
# docker-compose stack on omarchy (`make dev-up`), which uses no GHCR images.
# The branch trigger was `push: [dev]`, but the dev tier standardized on the
# `develop` branch (ci.yml triggers on `develop`); rather than auto-publishing
# arm64 images on every `develop` push (wrong consumer — develop is local), this
# workflow is decoupled from branch semantics and run on demand when a Pi wants
# fresh arm64 `:dev` images. Image tags stay `:dev` / `:dev-<sha>` so existing
# operator-side `docker compose pull` references keep working.
on:
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  ci:
    name: Build and test (API + Frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Dagger CLI
        run: curl -fsSL https://dl.dagger.io/dagger/install.sh | DAGGER_VERSION=v0.20.8 BIN_DIR=/usr/local/bin sh

      - name: Build and test API
        run: dagger -m ./dagger call build-api

      - name: Build and test Frontend
        run: dagger -m ./dagger call build-frontend

      - name: Test AI (toolsets + security)
        run: dagger -m ./dagger call test-ai

  publish-arm64:
    name: Publish arm64 images to GHCR (:dev, :dev-<sha>)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: ci
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up QEMU (arm64 emulation for cross-build)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Install Dagger CLI
        run: curl -fsSL https://dl.dagger.io/dagger/install.sh | DAGGER_VERSION=v0.20.8 BIN_DIR=/usr/local/bin sh

      - name: Publish arm64 images — immutable :dev-<sha>
        run: |
          dagger -m ./dagger call publish \
            --registry-token=env:GHCR_TOKEN \
            --org=overcast-software \
            --tag=dev-${{ github.sha }} \
            --platform=linux/arm64 \
            --registry-username=${{ github.actor }}
        env:
          GHCR_TOKEN: ${{ github.token }}

      - name: Publish arm64 images — moving :dev tag
        run: |
          dagger -m ./dagger call publish \
            --registry-token=env:GHCR_TOKEN \
            --org=overcast-software \
            --tag=dev \
            --platform=linux/arm64 \
            --registry-username=${{ github.actor }}
        env:
          GHCR_TOKEN: ${{ github.token }}
